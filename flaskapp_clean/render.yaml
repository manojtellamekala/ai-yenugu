services:
  - type: web
    name: aichat-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_SECRET_KEY
        fromSecret: flaskSecretKey
      - key: COHERE_API_KEY
        fromSecret: cohereApiKey
      - key: REPLICATE_API_TOKEN
        fromSecret: replicateApiToken
      - key: REDIRECT_URI
        value: https://your-render-app.onrender.com/api/drive-callback
      - key: FRONTEND_URL
        value: https://your-render-app.onrender.com
    env: python
    python:
      version: "3.9"
    plan: free

  - type: web
    name: aichat-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: serve -s build
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://your-render-app.onrender.com
    env: node
    node:
      version: "16.x"
    plan: free